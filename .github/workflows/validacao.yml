name: Validação do site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Verificar estrutura de arquivos obrigatórios
        run: |
          files=("index.html" "contato.html" "404.html" "css/style.css" "js/main.js" "data/comercios.json" "_headers" "_redirects" "src/worker.js")
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Arquivo obrigatório não encontrado: $f"
              exit 1
            fi
          done
          echo "✅ Todos os arquivos obrigatórios presentes"

      - name: Validar JSON dos comércios
        run: |
          python3 -c "
          import json, sys
          with open('data/comercios.json') as f:
            data = json.load(f)
          campos = ['id','nome','categoria','descricao','telefone','whatsapp','horario','bairro','entrega_rural','destaque','ativo']
          for i, item in enumerate(data):
            for campo in campos:
              if campo not in item:
                print(f'❌ Campo \"{campo}\" ausente no item {i}: {item.get(\"nome\",\"?\")}')
                sys.exit(1)
          print(f'✅ JSON válido com {len(data)} negócio(s)')
          "

      - name: Validar HTML (tags abertas/fechadas)
        run: |
          erro=0
          for f in index.html contato.html 404.html; do
            if ! python3 -c "
          import html.parser, sys
          class V(html.parser.HTMLParser):
            def __init__(self):
              super().__init__()
              self.errors = []
            def handle_starttag(self, tag, attrs):
              pass
          p = V()
          try:
            p.feed(open('$f').read())
          except Exception as e:
            print(f'❌ Erro de parsing em $f: {e}')
            sys.exit(1)
          print(f'✅ $f — HTML parseável')
          "; then
              erro=1
            fi
          done
          exit $erro

      - name: Verificar ausência de dados sensíveis no código
        run: |
          encontrou=0
          # Arquivos .env ou de credenciais no repositório
          if find . -name ".env" -o -name ".env.*" -o -name "credentials.json" | grep -q .; then
            echo "❌ Arquivo de credenciais encontrado no repositório"
            encontrou=1
          fi
          # Chaves hardcoded (padrões comuns de API keys)
          if grep -rn --include="*.js" --include="*.html" \
            -E '(sk_live_|pk_live_|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}|xox[bpars]-[a-zA-Z0-9-]+)' .; then
            echo "❌ Possível chave de API hardcoded encontrada"
            encontrou=1
          fi
          # Senhas ou chaves atribuídas diretamente como strings
          if grep -rn --include="*.js" --include="*.html" \
            -iE "(password|senha|api_key|apikey|secret_key)\s*[:=]\s*['\"][^'\"]+['\"]" \
            --exclude-dir=node_modules .; then
            echo "❌ Possível credencial hardcoded encontrada"
            encontrou=1
          fi
          if [ "$encontrou" -eq 1 ]; then
            echo "⚠️  Revise os itens acima antes de continuar."
            exit 1
          fi
          echo "✅ Nenhum dado sensível detectado"
